<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Shadow Sanctuary</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <img src="bg.jpg" class="background-img" alt="Sanctuary Table">

<div class="hotspot" id="museum-gate" style="top: 15%; left: 30%; width: 40%; height: 25%;"></div>

<div class="hotspot" id="water" style="top: 62%; left: 48%; width: 16%; height: 15%;"></div>

<div class="hotspot" id="medicine" style="top: 56%; left: 64%; width: 14%; height: 17%;"></div>

<div class="hotspot" id="tea-cup" style="top: 68%; left: 16%; width: 30%; height: 20%;"></div>

<div class="hotspot" id="journal" style="top: 78%; left: 61%; width: 30%; height: 18%;"></div>

<div id="medicine-modal" class="modal">
    <div class="modal-content">
        <span class="close-button">&times;</span>
        <h2 class="oriental-title">Дневной Рацион</h2>
        <ul class="check-list">
            <li><label><input type="checkbox" id="collagen"> <span>Коллаген</span></label></li>
            <li><label><input type="checkbox" id="inositol"> <span>Инозитол</span></label></li>
            <li><label><input type="checkbox" id="chlorella"> <span>Хлорелла</span></label></li>
            <li><label><input type="checkbox" id="venarus"> <span>Венарус</span></label></li>
            <li><label><input type="checkbox" id="complex"> <span>Комплекс витаминов</span></label></li>
        </ul>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
